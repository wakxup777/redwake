name: Publish RedWake Sandbox Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.4)'
        required: true
        default: 'dev'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push RedWake sandbox image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.tag }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building image: ghcr.io/${GITHUB_REPOSITORY}/redwake-sandbox:${VERSION}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/redwake-sandbox:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}/redwake-sandbox:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/redwake-sandbox:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/redwake-sandbox:buildcache,mode=max
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "## Sandbox image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ghcr.io/${GITHUB_REPOSITORY}/redwake-sandbox:${{ steps.meta.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${GITHUB_REPOSITORY}/redwake-sandbox:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verify:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${GITHUB_REPOSITORY}/redwake-sandbox:${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
